name: Automatic Build and Release

on:
  push:
    #branches:
    #  - v3  # 在 v3 分支上运行
    tags:
      - 'v*.*.*'  # 匹配 vx.xx.xx 格式的标签
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9' # '3.12'  # Python 3.12
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path -Path "requirements.txt" -PathType Leaf) {
          pip install -r requirements.txt
        } else {
          pip install pyinstaller ruamel.yaml colorama
        }
    
    - name: Build with PyInstaller
      run: |
        python -m pyinstaller --onefile --name 2RPM --clean 2RPM.py
    
    - name: Test the build
      run: |
        if (Test-Path -Path ".\dist\2RPM.exe" -PathType Leaf) {
          Write-Host "Build successful! Executable created at .\dist\2RPM.exe"
          Get-ChildItem -Path ".\dist"
        } else {
          Write-Host "Build failed! Executable not found."
          Get-ChildItem -Path "." -Recurse | Where-Object { $_.Name -like "*.exe" }
        }
    
    - name: Create release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: .\dist\2RPM.exe
        asset_name: 2RPM.exe
        asset_content_type: application/octet-stream
